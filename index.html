<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Tutor</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#eefbf7',
              100: '#d6f5ea',
              500: '#049F82',
              600: '#038269',
              700: '#026652',
            },
            ink: {
              900: '#173740',
              700: '#2a5560',
            },
          },
          keyframes: {
            popIn: {
              '0%':   { transform: 'scale(0.9) translateY(8px)', opacity: 0 },
              '100%': { transform: 'scale(1) translateY(0)',     opacity: 1 },
            },
            flashRed: {
              '0%':   { boxShadow: '0 0 0 4px rgba(239,68,68,0.85)' },
              '100%': { boxShadow: '0 0 0 0 rgba(239,68,68,0)' },
            },
            pulseGlow: {
              '0%,100%': { boxShadow: '0 0 0 4px rgba(253,224,71,0.9)' },
              '50%':     { boxShadow: '0 0 0 8px rgba(253,224,71,0.4)' },
            },
          },
          animation: {
            popIn: 'popIn 200ms ease-out',
            flashRed: 'flashRed 200ms ease-out',
            pulseGlow: 'pulseGlow 1.2s ease-in-out infinite',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles/app.css" />

  <script type="importmap">
  {
    "imports": {
      "vue": "https://esm.sh/vue@3.5.13"
    }
  }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>

  <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-ink-900 font-sans antialiased">
  <div id="app">
    <div class="min-h-screen flex items-center justify-center">
      <div class="text-slate-400">Loading…</div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
